name: CI

on:
  push:
    branches:
      - main
      - master
      - 'feat/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - master

jobs:
  check:
    name: Typecheck, Lint, Format, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run build

      - name: Lint & Format Check
        run: pnpm exec biome ci .

      - name: Test
        run: pnpm test --run
